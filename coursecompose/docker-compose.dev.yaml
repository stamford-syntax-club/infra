version: "3.8"
networks:
  course-compose:
  stamford:
    external: true
    name: haproxy_stamford
  redis_internal:
    external: true
    name: redis_internal

services:
  api-gateway:
    image: ghcr.io/stamford-syntax-club/course-compose:api-gateway-eaa804d996fed484b4ef8af17f17fa07da0a8e2c
    container_name: compose_api_gateway 
    restart: always
    volumes:
      - ./syntax-config.yaml:/app/syntax-config.yaml
    ports:
      - 8000:8000
    networks:
      - stamford # receive traffic from HAProxy
      - course-compose # send traffic to corresponding services


  course-api:
    image: ghcr.io/stamford-syntax-club/course-compose:course-api-516dbc444cfcea8860b8fe70cb42a3e2571d4f8b
    container_name: compose_api_course
    restart: always
    volumes:
      - ./.env.beta:/app/.env
    networks:
      - redis_internal
      - course-compose

  reviews-api:
    image: ghcr.io/stamford-syntax-club/course-compose:reviews-api-4e11782b8bfb1bd734aabc4601e558d76aea4cbe 
    container_name: compose_api_review
    restart: always
    volumes:
      - ./.env.beta:/app/.env.beta
    networks:
      - redis_internal
      - course-compose
